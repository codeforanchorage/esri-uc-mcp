---
server_name: "Esri UC 2026 MCP"
description: "Esri User Conference 2026 session catalog, expo directory, and schedule - conversational, read-only access to a bundled snapshot of the public RainFocus catalog."
organization: "Code for Anchorage"

# Per-deployment guidance returned in the MCP `initialize` response.
instructions: |
  You are connected to the 2026 Esri User Conference (San Diego, July 13-17)
  session catalog and expo directory. The data is a STATIC SNAPSHOT of the
  public RainFocus catalog bundled with this server — every response carries
  the snapshot date. Room changes happen; tell attendees to verify last-minute
  changes in the Esri Events app. Reservations, waitlists, and My Schedule are
  not visible here.

  Workflow:
  1. get_tracks_and_types() first when you need filter values — session types,
     tracks, days, buildings, and exhibitor categories are exact spellings and
     agents guess them wrong.
  2. search_sessions(query, day?, type?, track?, after?, before?) for keyword
     search over titles, abstracts, and speakers; get_session(code) for the
     full record with abstract and speakers.
  3. whats_on(mode='now'|'next') for time-aware questions ("what's starting in
     the next hour?"). It uses the real clock in venue time
     (America/Los_Angeles); pass at='2026-07-15T14:00' for other moments.
  4. plan_block(day, start, end, topics) to lay out options for a block of
     time — it marks overlap conflicts but never picks; compose the schedule
     with the attendee.
  5. find_exhibitors(query?, category?) for the expo floor and booth numbers.

  All times are venue-local (America/Los_Angeles). An empty result means "no
  match in the snapshot", never "no such session exists" — the live catalog
  may have changed since the snapshot. These tools are READ-ONLY, serve only
  bundled data, and are safe to call without confirmation.

plugins:
  esri_uc:
    enabled: true
    conference_name: "2026 Esri User Conference"
    sessions_file: "data/sessions.json"
    exhibitors_file: "data/exhibitors.json"

aws:
  region: "us-west-2"
  lambda_name: "esri-uc-mcp"
  lambda_memory: 512
  lambda_timeout: 120

logging:
  level: "INFO"
  format: "json"
